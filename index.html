<!DOCTYPE html>
<!-- saved from url=(0047)https://ddong1429-star.github.io/japanese-quiz/ -->
<html lang="ko"><style class="adjust-screen-brightness" media="screen"></style><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>일본어 단어 랜덤 퀴즈</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--primary:#5b3df5;--answer:#00c987;--soft:#eef0f4;--shadow:0 8px 30px rgba(17,24,39,.08)}
body.dark{--bg:#0f1117;--card:#191c24;--text:#f3f4f6;--muted:#a4a9b3;--line:#2b303b;--primary:#7c63ff;--answer:#19dea0;--soft:#252a35;--shadow:0 8px 30px rgba(0,0,0,.28)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR","Noto Sans JP",sans-serif}
.topbar{height:60px;background:#050505;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.title{font-weight:800}.sub{font-size:11px;color:#b9bec8;margin-top:2px}
.topbtn{border:0;border-radius:999px;background:#fff;padding:9px 14px;font-weight:700;cursor:pointer}
main{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:32px 18px}.wrap{width:min(820px,100%)}h1{text-align:center;font-size:26px;margin:0 0 14px}
.toolbar{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
select,button{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:13px;padding:10px 14px;font-weight:750;cursor:pointer}
.meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;margin-bottom:12px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;min-height:210px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;cursor:pointer;user-select:none}
.word{font-size:54px;font-weight:900}.answer{margin-top:14px;font-size:21px;font-weight:800;line-height:1.55;color:var(--answer)}.hidden{display:none}
.controls{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:16px}.primary{background:var(--primary);color:#fff;border-color:transparent}.darkbtn{background:#111827;color:#fff;border-color:transparent}
.active{outline:3px solid rgba(91,61,245,.18);background:#e8e3ff;color:#3f26cd}label.toggle{display:flex;align-items:center;gap:7px;font-size:13px}input[type=checkbox]{width:16px;height:16px}
.history-head{display:flex;justify-content:space-between;margin-top:20px;font-size:13px;font-weight:800}.history{margin-top:8px;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:12px 14px;min-height:48px;color:var(--muted);font-size:13px;display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:6px 10px;color:var(--text)}
.editor{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:18px;z-index:10}.editor.open{display:flex}.panel{width:min(760px,100%);background:var(--card);border-radius:20px;padding:22px;box-shadow:var(--shadow)}textarea{width:100%;height:360px;resize:vertical;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:14px;padding:14px;font:14px/1.6 ui-monospace,Consolas,monospace}.panel-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:12px}.hint{font-size:12px;color:var(--muted);margin:8px 0 12px}
@media(max-width:600px){.word{font-size:42px}.answer{font-size:18px}h1{font-size:22px}.controls button{flex:1}}
</style></head>
<body>
<header class="topbar"><div><div class="title">일본어 단어 랜덤 퀴즈</div><div class="sub">100개 단위 파트 분할 · words.txt 공통 단어장</div></div><button class="topbtn" id="openEditor">단어 편집</button></header>
<main><section class="wrap">
<h1>일본어 단어 랜덤 퀴즈</h1>
<div class="toolbar"><strong>학습 범위</strong><select id="partSelect"><option value="all">전체 (1123개)</option><option value="0">파트 1 (1~100)</option><option value="1">파트 2 (101~200)</option><option value="2">파트 3 (201~300)</option><option value="3">파트 4 (301~400)</option><option value="4">파트 5 (401~500)</option><option value="5">파트 6 (501~600)</option><option value="6">파트 7 (601~700)</option><option value="7">파트 8 (701~800)</option><option value="8">파트 9 (801~900)</option><option value="9">파트 10 (901~1000)</option><option value="10">파트 11 (1001~1100)</option><option value="11">파트 12 (1101~1123)</option></select><span id="partInfo">현재 범위 1123개</span></div>
<div class="meta"><span id="progress">1 / 1123　★0</span><span>Space: 정답 / Enter: 다음 / S: 섞기 / R: 앞뒤 / D: 다크</span></div>
<div class="card" id="card"><div class="word" id="question">連絡</div><div class="answer hidden" id="answer">렌라쿠 (연락)[이을 련/이을 락]</div></div>
<div class="controls">
<button class="primary" id="showAnswer">정답 보기</button><button id="nextBtn">다음</button><button class="darkbtn" id="shuffleBtn">섞기</button><button id="favBtn">☆ 즐겨찾기</button>
<label class="toggle"><input type="checkbox" id="favOnly"> 즐겨찾기만</label><label class="toggle"><input type="checkbox" id="reverse"> 한국어 먼저</label><label class="toggle"><input type="checkbox" id="darkMode"> 다크모드</label>
<label class="toggle"><input type="checkbox" id="autoPlay"> 자동 진행</label><select id="delay"><option value="2000">2초</option><option value="3000" selected="">3초</option><option value="5000">5초</option>
<option value="10000">10초</option></select>
</div>
<div class="history-head"><span>이전 단어 (최근 0 / 20)</span><button id="clearHistory" style="padding:4px 9px">비우기</button></div><div class="history" id="history">아직 히스토리가 없어. ‘다음’을 눌러 진행해 봐.</div>
</section></main>
<div class="editor" id="editor"><div class="panel"><h2 style="margin:0">단어 편집</h2><div class="hint">한 줄에 하나씩: 일본어 | 히라가나 | 정답 표시문<br>예: 今週 | こんしゅう | 콘슈우 (이번 주)[이제 금/돌 주]</div><textarea id="wordInput"></textarea><div class="panel-actions"><button id="closeEditor">취소</button><button class="primary" id="saveWords">저장</button></div></div></div>
<script>
let defaultWords = [];
let words = [];
let favorites = new Set(JSON.parse(localStorage.getItem("jpQuizFavs_txt_v2") || "[]"));
let deck = [], index = 0, shown = false, history = [], timer = null;
const $ = id => document.getElementById(id);

async function loadWords() {
  const response = await fetch("words.txt?v=1123-2", { cache: "no-store" });
  if (!response.ok) throw new Error(`words.txt 불러오기 실패: ${response.status}`);
  const text = await response.text();
  defaultWords = text
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => line.split("|").map(part => part.trim()))
    .filter(parts => parts.length >= 3 && parts[0] && parts[1] && parts[2])
    .map(parts => [parts[0], parts[1], parts.slice(2).join(" | ")]);
  words = [...defaultWords];
  buildPartOptions();
  rebuild(true);
}

function buildPartOptions(){const s=$("partSelect"),cur=s.value||"all",parts=Math.ceil(words.length/100);s.innerHTML=`<option value="all">전체 (${words.length}개)</option>`;for(let i=0;i<parts;i++){const a=i*100+1,b=Math.min((i+1)*100,words.length);s.insertAdjacentHTML("beforeend",`<option value="${i}">파트 ${i+1} (${a}~${b})</option>`)}if([...s.options].some(o=>o.value===cur))s.value=cur}
function selectedBase(){const v=$("partSelect").value;if(v==="all")return [...words];const i=Number(v);return words.slice(i*100,(i+1)*100)}
function activeWords(){let a=selectedBase();if($("favOnly").checked)a=a.filter(w=>favorites.has(w[0]));return a}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function rebuild(x=true){deck=activeWords();if(x)shuffle(deck);index=0;shown=false;render()}
function current(){return deck[index]||null}
function koreanMeaning(answerText){const m=answerText.match(/\((.*?)\)/);return m?m[1]:answerText}
function render(){clearTimeout(timer);const w=current();$("partInfo").textContent=`현재 범위 ${selectedBase().length}개`;if(!w){$("question").textContent="단어 없음";$("answer").textContent="이 범위에 표시할 단어가 없어.";$("answer").classList.remove("hidden");$("progress").textContent=`0 / 0　★${favorites.size}`;return}const rev=$("reverse").checked;$("question").textContent=rev?koreanMeaning(w[2]):w[0];$("answer").textContent=rev?`${w[0]}（${w[1]}） · ${w[2]}`:w[2];$("answer").classList.toggle("hidden",!shown);$("showAnswer").textContent=shown?"정답 숨기기":"정답 보기";$("favBtn").textContent=favorites.has(w[0])?"★ 즐겨찾기":"☆ 즐겨찾기";$("favBtn").classList.toggle("active",favorites.has(w[0]));$("progress").textContent=`${index+1} / ${deck.length}　★${favorites.size}`;updateHistory();if($("autoPlay").checked){
  timer=setTimeout(()=>{
    if(shown) nextWord();
    else toggleAnswer();
  },Number($("delay").value));
}}
function toggleAnswer(){shown=!shown;render()}
function nextWord(){const w=current();if(w){history.unshift(w[0]);history=history.slice(0,20)}index=deck.length?(index+1)%deck.length:0;shown=false;render()}
function updateHistory(){document.querySelector(".history-head span").textContent=`이전 단어 (최근 ${history.length} / 20)`;$("history").innerHTML=history.length?history.map(x=>`<span class="chip">${x}</span>`).join(""):"아직 히스토리가 없어. ‘다음’을 눌러 진행해 봐."}
function toggleFavorite(){const w=current();if(!w)return;favorites.has(w[0])?favorites.delete(w[0]):favorites.add(w[0]);localStorage.setItem("jpQuizFavs_txt_v2",JSON.stringify([...favorites]));$("favOnly").checked?rebuild(false):render()}
function applyDark(on){document.body.classList.toggle("dark",on);localStorage.setItem("jpQuizDark_txt_v2",on?"1":"0")}
function openEditor(){$("wordInput").value=words.map(w=>w.join(" | ")).join("\n");$("editor").classList.add("open")}
function saveWords(){const p=$("wordInput").value.split("\n").map(x=>x.trim()).filter(Boolean).map(x=>x.split("|").map(y=>y.trim())).filter(x=>x.length>=3&&x[0]&&x[1]&&x[2]).map(x=>[x[0],x[1],x.slice(2).join(" | ")]);if(!p.length){alert("올바른 단어가 없어.");return}words=p;buildPartOptions();$("editor").classList.remove("open");rebuild(true);alert("이 기기에서만 임시 적용됐어. 모든 기기에 적용하려면 GitHub의 words.txt를 수정해야 해.")}

$("showAnswer").onclick=toggleAnswer;$("card").onclick=toggleAnswer;$("nextBtn").onclick=nextWord;$("shuffleBtn").onclick=()=>rebuild(true);$("favBtn").onclick=toggleFavorite;$("favOnly").onchange=()=>rebuild(true);$("reverse").onchange=()=>{shown=false;render()};$("partSelect").onchange=()=>rebuild(true);$("darkMode").onchange=e=>applyDark(e.target.checked);$("autoPlay").onchange=render;$("delay").onchange=render;$("clearHistory").onclick=()=>{history=[];updateHistory()};$("openEditor").onclick=openEditor;$("closeEditor").onclick=()=>$("editor").classList.remove("open");$("saveWords").onclick=saveWords;$("editor").onclick=e=>{if(e.target===$("editor"))$("editor").classList.remove("open")};
document.addEventListener("keydown",e=>{
  if(e.repeat) return;
  if($("editor").classList.contains("open")) return;

  if(e.code==="Space"){
    e.preventDefault();
    toggleAnswer();
  }else if(e.key==="Enter"){
    e.preventDefault();
    nextWord();
  }else if(e.key.toLowerCase()==="s"){
    rebuild(true);
  }else if(e.key.toLowerCase()==="r"){
    $("reverse").checked=!$("reverse").checked;
    shown=false;
    render();
  }else if(e.key.toLowerCase()==="d"){
    $("darkMode").checked=!$("darkMode").checked;
    applyDark($("darkMode").checked);
  }
});
const ds=localStorage.getItem("jpQuizDark_txt_v2")==="1";$("darkMode").checked=ds;applyDark(ds);
loadWords().catch(error=>{console.error(error);$("question").textContent="불러오기 실패";$("answer").textContent="words.txt 파일이 index.html과 같은 위치에 있는지 확인해.";$("answer").classList.remove("hidden")});
</script>
</body></html>
